<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BikeRent Pro Admin</title>
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon_io/favicon-16x16.png">
    <link rel="manifest" href="../favicon_io/site.webmanifest">
    <meta name="theme-color" content="#FF0033">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <!-- Fast Firebase Init - Prefetch data immediately -->
    <script src="js/firebase-init.js"></script>
</head>

<body>
    <div class="login-container">
        <div class="login-card glass">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-motorcycle"></i>
                    <h1>First Season Moto</h1>
                </div>
                <h2>Admin Login</h2>
                <p>Enter your password to access the dashboard</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()"
                            title="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>

                <div id="error-message" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Invalid password. Please try again.</span>
                </div>
            </form>

            <div class="login-footer">

                <div class="language-switcher">
                    <button onclick="changeLanguage('en')" class="lang-btn active">English</button>
                    <button onclick="changeLanguage('ar')" class="lang-btn">العربية</button>
                </div>
            </div>
        </div>

        <div class="background-elements">
            <div class="floating-bike bike-1">
                <i class="fas fa-bicycle"></i>
            </div>
            <div class="floating-bike bike-2">
                <i class="fas fa-bicycle"></i>
            </div>
            <div class="floating-bike bike-3">
                <i class="fas fa-bicycle"></i>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
