        let setupProgress = 0;

        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<div class="${type}">${message}</div>`;
        }

        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function updateStats(bikes, users, bookings, revenue) {
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('bikesCount').textContent = bikes;
            document.getElementById('usersCount').textContent = users;
            document.getElementById('bookingsCount').textContent = bookings;
            document.getElementById('revenueCount').textContent = 'AED ' + revenue;
        }

        async function startSetup() {
            const setupBtn = document.getElementById('setupBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            setupBtn.disabled = true;
            clearBtn.disabled = true;
            
            try {
                updateStatus('🚀 Starting setup...', 'loading');
                updateProgress(0);

                // 1. Add Settings
                updateStatus('⚙️ Adding settings...', 'loading');
                updateProgress(10);
                await window.db.collection('settings').doc('app').set({
                    ...sampleData.settings,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. Add Bikes
                updateStatus('🚴‍♂️ Adding bikes...', 'loading');
                updateProgress(20);
                const bikeIds = [];
                for (const bike of sampleData.bikes) {
                    const docRef = await window.db.collection('bikes').add({
                        ...bike,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    bikeIds.push(docRef.id);
                    updateProgress(20 + (bikeIds.length / sampleData.bikes.length) * 20);
                }

                // 3. Add Users
                updateStatus('👥 Adding users...', 'loading');
                updateProgress(40);
                const userIds = [];
                for (const user of sampleData.users) {
                    const docRef = await window.db.collection('users').add({
                        ...user,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    userIds.push(docRef.id);
                    updateProgress(40 + (userIds.length / sampleData.users.length) * 20);
                }

                // 4. Add Bookings
                updateStatus('📅 Adding bookings...', 'loading');
                updateProgress(60);
                const bookingIds = [];
                let totalRevenue = 0;
                
                for (let i = 0; i < sampleData.bookings.length; i++) {
                    const booking = {
                        ...sampleData.bookings[i],
                        userId: userIds[i % userIds.length],
                        bikeId: bikeIds[i % bikeIds.length],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    const docRef = await window.db.collection('bookings').add(booking);
                    bookingIds.push(docRef.id);
                    totalRevenue += booking.totalAmount;
                    updateProgress(60 + (bookingIds.length / sampleData.bookings.length) * 30);
                }

                // 5. Finalize
                updateProgress(100);
                updateStatus('🎉 Setup completed successfully!', 'success');
                updateStats(sampleData.bikes.length, sampleData.users.length, sampleData.bookings.length, totalRevenue.toFixed(2));

            } catch (error) {
                console.error('Setup error:', error);
                updateStatus('❌ Error: ' + error.message, 'error');
            } finally {
                setupBtn.disabled = false;
                clearBtn.disabled = false;
            }
        }

        async function clearData() {
            if (!confirm('⚠️ Are you sure you want to delete ALL data? This cannot be undone!')) {
                return;
            }

            const clearBtn = document.getElementById('clearBtn');
            const setupBtn = document.getElementById('setupBtn');
            
            clearBtn.disabled = true;
            setupBtn.disabled = true;
            
            try {
                updateStatus('🗑️ Clearing all data...', 'loading');
                updateProgress(0);

                // Get all collections
                const bikes = await db.collection('bikes').get();
                const users = await db.collection('users').get();
                const bookings = await db.collection('bookings').get();

                // Delete all documents
                let deleted = 0;
                const totalToDelete = bikes.size + users.size + bookings.size + 1; // +1 for settings

                for (const doc of bikes.docs) {
                    await doc.ref.delete();
                    deleted++;
                    updateProgress((deleted / totalToDelete) * 100);
                }

                for (const doc of users.docs) {
                    await doc.ref.delete();
                    deleted++;
                    updateProgress((deleted / totalToDelete) * 100);
                }

                for (const doc of bookings.docs) {
                    await doc.ref.delete();
                    deleted++;
                    updateProgress((deleted / totalToDelete) * 100);
                }

                // Clear settings
                await db.collection('settings').doc('app').delete();
                updateProgress(100);

                updateStatus('✅ All data cleared successfully!', 'success');
                updateStats(0, 0, 0, 0);

            } catch (error) {
                console.error('Clear error:', error);
                updateStatus('❌ Error: ' + error.message, 'error');
            } finally {
                clearBtn.disabled = false;
                setupBtn.disabled = false;
            }
        }

        // Check current data on load and auto-populate if empty
        window.addEventListener('load', async () => {
            try {
                const bikes = await window.db.collection('bikes').get();
                const users = await window.db.collection('users').get();
                const bookings = await window.db.collection('bookings').get();
                
                const totalRevenue = bookings.docs
                    .filter(doc => doc.data().status === 'completed')
                    .reduce((sum, doc) => sum + (doc.data().totalAmount || 0), 0);

                updateStats(bikes.size, users.size, bookings.size, totalRevenue.toFixed(2));
                
                if (bikes.size === 0 && users.size === 0 && bookings.size === 0) {
                    updateStatus('🚀 Database is empty, auto-populating...', 'loading');
                    // Automatically start setup
                    setTimeout(() => startSetup(), 1000);
                } else if (bikes.size === 0) {
                    updateStatus('🚴‍♂️ Bikes collection empty, auto-populating...', 'loading');
                    setTimeout(() => startSetup(), 1000);
                } else {
                    updateStatus('📊 Data already exists in your database', 'success');
                }
                
                updateProgress(100);
                
            } catch (error) {
                console.error('Load error:', error);
                updateStatus('❌ Error loading data: ' + error.message, 'error');
            }
        });
    </script>
