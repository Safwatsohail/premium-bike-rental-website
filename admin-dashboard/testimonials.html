<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials Management - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bikes.css">
    <link rel="stylesheet" href="css/notifications.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <!-- Fast Firebase Init - Prefetch data immediately -->
    <script src="js/firebase-init.js"></script>
</head>

<body>
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleSidebar()" style="display: none;">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <img src="Open folder Model.png" alt="First Season Moto" class="logo-img">
            </div>
            <nav>
                <ul>
                    <li><a href="main_admin.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> <span>Users</span></a></li>
                    <li><a href="bikes.html"><i class="fas fa-bicycle"></i> <span>Bikes</span></a></li>
                    <li><a href="accessories.html"><i class="fas fa-toolbox"></i> <span>Accessories</span></a></li>
                    <li><a href="bookings.html"><i class="fas fa-calendar-alt"></i> <span>Bookings</span></a></li>
                    <li class="active"><a href="testimonials.html"><i class="fas fa-star"></i> <span>Testimonials</span></a></li>
                    <li><a href="analytics.html"><i class="fas fa-chart-line"></i> <span>Analytics</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchTestimonials" placeholder="Search testimonials...">
                </div>
                <div class="user-actions">
                    <i class="fas fa-bell"></i>
                    <div class="user-profile">
                        <img src="https://via.placeholder.com/40" alt="Admin">
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="page-header">
                    <h1>Testimonials Management</h1>
                    <button id="addNewTestimonial" class="btn btn-primary">
                        <i class="fas fa-plus"></i> <span>Add New Testimonial</span>
                    </button>
                </div>

                <!-- Testimonials Grid -->
                <div class="bikes-grid" id="testimonialsContainer">
                    <!-- Testimonials will be dynamically loaded here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Testimonial Modal -->
    <div class="modal" id="testimonialModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Testimonial</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="testimonialForm">
                <input type="hidden" id="testimonialId">

                <div class="form-group">
                    <label for="customerAvatar">Customer Photo</label>
                    <div class="image-upload">
                        <img id="avatarPreview" src="https://via.placeholder.com/150?text=Upload+Photo"
                            alt="Customer Photo">
                        <input type="file" id="customerAvatar" accept="image/*">
                        <label for="customerAvatar" class="upload-btn">
                            <i class="fas fa-upload"></i> <span>Choose Photo</span>
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="customerName">Customer Name</label>
                        <input type="text" id="customerName" placeholder="e.g. Ahmed K." required>
                    </div>
                    <div class="form-group">
                        <label for="customerTitle">Customer Title</label>
                        <input type="text" id="customerTitle" placeholder="e.g. Regular Customer" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" required>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="testimonialText">Testimonial Text</label>
                    <textarea id="testimonialText" rows="4" placeholder="Customer's feedback..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="displayOrder">Display Order</label>
                    <input type="number" id="displayOrder" min="1" placeholder="1" value="1">
                    <small style="color: #888;">Lower numbers appear first</small>
                </div>

                <div class="form-group">
                    <label for="isActive">Status</label>
                    <select id="isActive" required>
                        <option value="true">Active (Visible on website)</option>
                        <option value="false">Inactive (Hidden)</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelTestimonial">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Testimonial</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Confirm Action</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this testimonial? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/session-manager.js"></script>
    <script src="js/testimonials.js"></script>
    <script>
        // Mobile sidebar toggle
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Show mobile menu toggle on small screens
        function handleResize() {
            const toggle = document.querySelector('.mobile-menu-toggle');
            if (window.innerWidth <= 768) {
                toggle.style.display = 'block';
            } else {
                toggle.style.display = 'none';
                document.querySelector('.sidebar').classList.remove('active');
                document.querySelector('.sidebar-overlay').classList.remove('active');
            }
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('load', handleResize);
    </script>
</body>

</html>
