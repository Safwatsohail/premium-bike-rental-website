<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Firebase Bikes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .bike-item {
            background: #2a2a2a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ff0000;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.available { background: #00ff00; color: #000; }
        .status.rented { background: #ff9900; color: #000; }
        .status.maintenance { background: #ff0000; color: #fff; }
        pre {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 20px;
        }
        .error {
            background: #ff0000;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🔍 Firebase Bikes Database Check</h1>
    <div id="output" class="loading">Loading bikes from Firebase...</div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_FIREBASE_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.firebasestorage.app",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "1:YOUR_MESSAGING_SENDER_ID:web:27d28d44e449306b726b97",
            measurementId: "YOUR_MEASUREMENT_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Check bikes collection
        db.collection('bikes').get()
            .then((snapshot) => {
                const output = document.getElementById('output');
                
                if (snapshot.empty) {
                    output.innerHTML = `
                        <div class="error">
                            <h2>❌ No Bikes Found in Firebase!</h2>
                            <p>The 'bikes' collection is empty. You need to add bikes from the admin dashboard.</p>
                            <p><strong>Go to:</strong> admin-dashboard/bikes.html and add some bikes.</p>
                        </div>
                    `;
                    return;
                }

                let html = `<h2>✅ Found ${snapshot.size} bike(s) in Firebase</h2>`;
                
                snapshot.forEach((doc) => {
                    const bike = doc.data();
                    html += `
                        <div class="bike-item">
                            <h3>${bike.name || 'Unnamed Bike'} <span class="status ${bike.status}">${bike.status || 'unknown'}</span></h3>
                            <p><strong>ID:</strong> ${doc.id}</p>
                            <p><strong>Type:</strong> ${bike.type || 'N/A'}</p>
                            <p><strong>Price:</strong> AED ${bike.price || '0'}</p>
                            <p><strong>Status:</strong> ${bike.status || 'N/A'}</p>
                            <p><strong>Features:</strong> ${bike.features ? bike.features.join(', ') : 'None'}</p>
                            <p><strong>Description:</strong> ${bike.description || 'No description'}</p>
                            <p><strong>Has Image:</strong> ${bike.image ? '✅ Yes' : '❌ No'}</p>
                            <details>
                                <summary>View Full Data</summary>
                                <pre>${JSON.stringify(bike, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                });

                output.innerHTML = html;
            })
            .catch((error) => {
                document.getElementById('output').innerHTML = `
                    <div class="error">
                        <h2>❌ Error Loading Bikes</h2>
                        <p>${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
                console.error('Firebase error:', error);
            });
    </script>
</body>
</html>
